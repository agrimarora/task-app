version: '3.8'

services:
  db:
    image: postgres:17
    container_name: postgres-db

    restart: always

    ports:
      - "5432:5432"

    environment:
      POSTGRES_DB: taskdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changemeinprod!

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: